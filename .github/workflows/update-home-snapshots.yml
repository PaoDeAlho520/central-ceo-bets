name: Atualizar snapshots da home

on:
  schedule:
    - cron: "40 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Atualizar snapshots da pagina principal
        run: node scripts/update-home-snapshots.mjs

      - name: Commit se houver mudanca
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/external-ceo-static.json data/external-brand-metrics-static.json data/external-ceo-history.json data/pagespeed-cache.json
          git diff --cached --quiet || git commit -m "Atualiza snapshots da home"
          git push
