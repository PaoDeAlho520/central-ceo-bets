name: Atualizar PageSpeed

on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Coletar PageSpeed e fallback tecnico
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: node scripts/collect-pagespeed.mjs

      - name: Atualizar snapshots da pagina principal
        run: node scripts/update-home-snapshots.mjs

      - name: Commit se houver mudanca
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pagespeed-cache.json data/pagespeed-history.json data/external-ceo-static.json data/external-brand-metrics-static.json data/external-ceo-history.json
          git diff --cached --quiet || git commit -m "Atualiza PageSpeed diario"
          git push
